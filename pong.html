<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000;
        }
        canvas {
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const ballRadius = 10;
        let x = canvas.width / 2;
        let y = canvas.height / 2;
        let dx = 2;
        let dy = 2;
        const paddleWidth = 10;
        const paddleHeight = 75;
        let playerY = (canvas.height - paddleHeight) / 2;
        let aiY = (canvas.height - paddleHeight) / 2;
        let playerScore = 0;
        let aiScore = 0;

        document.addEventListener('mousemove', (e) => {
            const mouseY = e.clientY - canvas.getBoundingClientRect().top;
            playerY = mouseY - paddleHeight / 2;
        });

        function drawBall() {
            context.beginPath();
            context.arc(x, y, ballRadius, 0, Math.PI * 2);
            context.fillStyle = '#fff';
            context.fill();
            context.closePath();
        }

        function drawPaddle(x, y) {
            context.beginPath();
            context.rect(x, y, paddleWidth, paddleHeight);
            context.fillStyle = '#fff';
            context.fill();
            context.closePath();
        }

        function drawScore() {
            context.fillStyle = '#fff';
            context.font = '16px Arial';
            context.fillText(`Player: ${playerScore}`, 50, 20);
            context.fillText(`AI: ${aiScore}`, canvas.width - 100, 20);
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddle(0, playerY);
            drawPaddle(canvas.width - paddleWidth, aiY);
            drawScore();

            // Ball movement
            x += dx;
            y += dy;

            // Ball collision with top and bottom walls
            if (y + dy > canvas.height - ballRadius || y + dy < ballRadius) {
                dy = -dy;
            }

            // Ball collision with paddles
            if (x < paddleWidth && y > playerY && y < playerY + paddleHeight) {
                dx = -dx;
            } else if (x > canvas.width - paddleWidth && y > aiY && y < aiY + paddleHeight) {
                dx = -dx;
            }

            // Scoring
            if (x + dx < ballRadius) {
                aiScore++;
                resetBall();
            } else if (x + dx > canvas.width - ballRadius) {
                playerScore++;
                resetBall();
            }

            // AI control
            aiY += (y - (aiY + paddleHeight / 2)) * 0.09;
        }

        function resetBall() {
            x = canvas.width / 2;
            y = canvas.height / 2;
            dx = -dx;
        }

        setInterval(draw, 10);
    </script>
</body>
</html>
